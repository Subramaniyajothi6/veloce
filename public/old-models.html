<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELOCE — Previous (placeholder) models</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b0b0d;
      color: #e8e8ea;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    header {
      padding: 40px 32px 24px;
      border-bottom: 1px solid #1c1c20;
    }
    header h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .18em; text-transform: uppercase; }
    header p { margin: 0; color: #9a9aa2; font-size: 14px; }
    header a { color: #c8a24a; text-decoration: none; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 28px 32px 64px;
    }
    .card {
      background: #131316;
      border: 1px solid #1f1f24;
      border-radius: 12px;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 300px;
      background: radial-gradient(circle at 50% 35%, #1a1a1f 0%, #0d0d10 70%);
      --poster-color: transparent;
    }
    .meta { padding: 14px 16px 16px; }
    .meta h2 { margin: 0 0 4px; font-size: 16px; letter-spacing: .04em; }
    .meta span { color: #8a8a92; font-size: 12.5px; }
    .tag {
      display: inline-block; margin-top: 8px; padding: 2px 9px;
      font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
      color: #c8a24a; border: 1px solid #3a3320; border-radius: 999px;
    }
  </style>
</head>
<body>
  <header>
    <h1>VELOCE — Previous Models</h1>
    <p>The original placeholder GLBs, recovered from git (commit 085c6bb), before the
       2026-06-12 swap. Drag to rotate · scroll to zoom. &nbsp;·&nbsp;
       <a href="http://localhost:3000">← back to the live site (new models)</a></p>
  </header>

  <div class="grid" id="grid"></div>

  <script>
    const models = [
      { slug: "royale",       name: "Royale",       cat: "Hypercar" },
      { slug: "furia",        name: "Furia",        cat: "Hybrid Hypercar" },
      { slug: "vento-rs",     name: "Vento RS",     cat: "Supercar" },
      { slug: "tempesta-v12", name: "Tempesta V12", cat: "V12 Coupé" },
      { slug: "giallo-gt",    name: "Giallo GT",    cat: "Grand Tourer" },
      { slug: "notte-v10",    name: "Notte V10",    cat: "Grand Tourer" },
      { slug: "volt-zero",    name: "Volt Zero",    cat: "Hyper EV" },
    ];
    const grid = document.getElementById("grid");
    for (const m of models) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <model-viewer
          src="/models-old/${m.slug}.glb"
          alt="${m.name} (placeholder model)"
          camera-controls
          auto-rotate
          rotation-per-second="18deg"
          shadow-intensity="1"
          exposure="1.05"
          environment-image="neutral"></model-viewer>
        <div class="meta">
          <h2>${m.name}</h2>
          <span>${m.slug}.glb</span>
          <div><span class="tag">${m.cat}</span> <span class="tag">placeholder</span></div>
        </div>`;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
